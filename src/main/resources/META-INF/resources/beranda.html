<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VizLyst - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --panel: #efefef;
            --ink: #111111;
            --line: #111111;
            --muted: #6b7280;
            --shadow: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
            background: var(--bg);
            color: var(--ink);
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .page-label {
            position: fixed;
            top: 34px;
            left: 50%;
            transform: translateX(-50%);
            color: #c9c9c9;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0;
        }

        .dashboard-shell {
            width: min(100%, 300px);
            background: var(--panel);
            padding: 12px 12px 14px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            border-radius: 4px;
            background: #0b0b0b;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Space Grotesk", "Manrope", sans-serif;
            font-size: 15px;
            font-weight: 700;
        }

        .logo span {
            font-family: "Space Grotesk", "Manrope", sans-serif;
            font-style: italic;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .date {
            font-size: 0.92rem;
            color: #111111;
        }

        .login-btn {
            border: 2px solid var(--line);
            padding: 0 8px;
            height: 28px;
            border-radius: 7px;
            background: #f7f7f7;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88rem;
            font-weight: 700;
            color: #111111;
        }

        .user-icon {
            width: 18px;
            height: 18px;
            display: grid;
            place-items: center;
            font-size: 18px;
            line-height: 1;
        }

        .welcome-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin: 6px 0 8px;
        }

        .cards-grid,
        .bottom-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card,
        .chart-card {
            background: transparent;
            border: 2px solid var(--line);
            border-radius: 14px;
            padding: 10px 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 82px;
        }

        .card-title {
            font-size: 0.98rem;
            font-weight: 800;
            color: #111111;
            text-align: center;
        }

        .card-text input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--muted);
            font: inherit;
            font-size: 0.9rem;
            padding: 0;
            outline: none;
        }

        .card-text input::placeholder {
            color: var(--muted);
        }

        .card-content {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 40px;
        }

        .card-icon {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }

        .metric-box {
            flex: 1;
        }

        .metric-value,
        .metric-product {
            font-weight: 800;
            line-height: 1.1;
        }

        .metric-value {
            font-size: 1.2rem;
        }

        .metric-product {
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 175px;
        }

        .metric-subtext {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 3px;
        }

        .chart-card {
            min-height: 210px;
        }

        .chart-figure {
            flex: 1;
            border: none;
            border-radius: 0;
            background: transparent;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sales-chart {
            width: 100%;
            height: 150px;
            display: block;
        }

        .chart-meta {
            margin: 0;
            font-size: 0.72rem;
            color: var(--muted);
            text-align: center;
            font-weight: 600;
        }

        .bottom-nav {
            margin-top: 10px;
            border: 2px solid var(--line);
            border-radius: 16px;
            background: #dadada;
            padding: 8px 6px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .nav-item {
            border: 0;
            background: #fff;
            border-radius: 999px;
            padding: 6px 8px;
            display: grid;
            place-items: center;
            gap: 2px;
            color: var(--ink);
            font: inherit;
            cursor: pointer;
        }

        .nav-item.active {
            background: #fff;
        }

        .nav-icon {
            font-size: 1.15rem;
            line-height: 1;
        }

        .nav-label {
            font-size: 0.72rem;
            font-weight: 800;
        }

        .login-btn:hover {
            background: #f2f2f2;
        }

        .card-text input:focus,
        .login-btn:focus-visible,
        .nav-item:focus-visible {
            outline: 3px solid rgba(17, 17, 17, 0.16);
            outline-offset: 2px;
        }

        @media (max-width: 430px) {
            body {
                padding: 12px;
            }

            .page-label {
                top: 28px;
                font-size: 0.95rem;
            }

            .dashboard-shell {
                width: min(100%, 300px);
                padding: 12px 10px 12px;
            }

            .date {
                font-size: 0.86rem;
            }

            .login-btn {
                height: 26px;
                font-size: 0.82rem;
            }

            .welcome-title {
                font-size: 1.05rem;
                margin-top: 4px;
            }

            .card,
            .chart-card {
                padding: 8px 8px 10px;
                border-radius: 14px;
                min-height: 74px;
            }

            .chart-card {
                min-height: 196px;
            }

            .card-title {
                font-size: 0.92rem;
            }

            .card-icon {
                width: 40px;
                height: 40px;
                font-size: 1.8rem;
            }

            .metric-value {
                font-size: 1.05rem;
            }

            .metric-product {
                max-width: 160px;
            }

            .sales-chart {
                height: 140px;
            }

            .bottom-nav {
                padding: 7px 5px;
                gap: 6px;
            }

            .nav-label {
                font-size: 0.68rem;
            }
        }

        @media (max-width: 360px) {
            .dashboard-shell {
                width: min(100%, 286px);
            }

            .metric-product {
                max-width: 150px;
            }

            .nav-label {
                font-size: 0.66rem;
            }
        }
    </style>
</head>
<body>
    <p class="page-label">BERANDA</p>

    <main class="dashboard-shell">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">VL</div>
                <span>VizLyst</span>
            </div>
            <div class="header-right">
                <button class="login-btn" id="accountBtn" type="button">
                    <div class="user-icon" aria-hidden="true">◌</div>
                    <span id="accountBtnLabel">Masuk Akun</span>
                </button>
                <div class="date" id="todayDate">Sabtu, 07 Maret 2026</div>
            </div>
        </header>

        <div class="welcome-title">Selamat Datang!</div>

        <section class="cards-grid" aria-label="Ringkasan">
            <div class="card">
                <div class="card-title">Catatan !</div>
                <div class="card-text">
                    <input type="text" placeholder="Tambahkan catatan..." aria-label="Tambahkan catatan">
                </div>
            </div>

            <div class="card">
                <div class="card-title">Total Penjualan Hari Ini</div>
                <div class="card-content">
                    <div class="card-icon" aria-hidden="true">📈</div>
                    <div class="metric-box" style="text-align: right;">
                        <div class="metric-value" id="totalSalesToday">0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Total Pendapatan</div>
                <div class="card-content">
                    <div class="card-icon" aria-hidden="true">💰</div>
                    <div class="metric-box" style="text-align: right;">
                        <div class="metric-value" id="totalRevenue">Rp 0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Daftar Produk</div>
                <div class="card-content">
                    <div class="card-icon" aria-hidden="true">📦</div>
                    <div class="metric-box" style="text-align: right;">
                        <div class="metric-product" id="topProduct">-</div>
                        <div class="metric-subtext" id="topProductMeta">Belum ada data</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bottom-grid" aria-label="Grafik">
            <div class="chart-card">
                <div class="card-title">Grafik Penjualan</div>
                <div class="chart-figure">
                    <svg class="sales-chart" id="salesChart" viewBox="0 0 320 170" role="img" aria-label="Grafik penjualan dari prediksi"></svg>
                    <p class="chart-meta" id="chartMeta">Menunggu data dari halaman prediksi.</p>
                </div>
            </div>
        </section>

        <nav class="bottom-nav" aria-label="Navigasi utama">
            <button class="nav-item active" type="button" aria-current="page" id="navHome">
                <div class="nav-icon" aria-hidden="true">⌂</div>
                <div class="nav-label">Beranda</div>
            </button>
            <button class="nav-item" type="button" id="navCatat">
                <div class="nav-icon" aria-hidden="true">📝</div>
                <div class="nav-label">Catat</div>
            </button>
            <button class="nav-item" type="button" id="navPrediksi">
                <div class="nav-icon" aria-hidden="true">📊</div>
                <div class="nav-label">Prediksi</div>
            </button>
        </nav>
    </main>

    <script>
        const AUTH_SESSION_KEY = "vizlyst.auth.session";
        const SALES_RECORDS_KEY = "vizlyst.sales.records";
        const PREDICTION_CHART_KEY = "vizlyst.prediction.chart";

        const accountBtn = document.getElementById("accountBtn");
        const accountBtnLabel = document.getElementById("accountBtnLabel");
        const totalSalesTodayEl = document.getElementById("totalSalesToday");
        const totalRevenueEl = document.getElementById("totalRevenue");
        const topProductEl = document.getElementById("topProduct");
        const topProductMetaEl = document.getElementById("topProductMeta");
        const salesChartEl = document.getElementById("salesChart");
        const chartMetaEl = document.getElementById("chartMeta");
        const todayDateEl = document.getElementById("todayDate");
        const navCatat = document.getElementById("navCatat");
        const navPrediksi = document.getElementById("navPrediksi");

        function updateTodayDate() {
            const now = new Date();
            const options = {
                weekday: "long",
                day: "2-digit",
                month: "long",
                year: "numeric"
            };
            const formatted = new Intl.DateTimeFormat("id-ID", options).format(now);
            todayDateEl.textContent = formatted;
        }

        function readAuthSession() {
            const parseSession = (raw) => {
                if (!raw) {
                    return null;
                }

                try {
                    const parsed = JSON.parse(raw);
                    if (parsed && typeof parsed.username === "string" && parsed.username.trim()) {
                        return parsed;
                    }
                    return null;
                } catch (error) {
                    return null;
                }
            };

            const fromSession = parseSession(sessionStorage.getItem(AUTH_SESSION_KEY));
            if (fromSession) {
                return fromSession;
            }

            const fromPersistent = parseSession(localStorage.getItem(AUTH_SESSION_KEY));
            if (fromPersistent) {
                sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(fromPersistent));
                return fromPersistent;
            }

            return null;
        }

        function requireAuth() {
            const activeSession = readAuthSession();
            if (!activeSession) {
                window.location.replace("login.html?next=beranda.html");
                return null;
            }
            return activeSession;
        }

        const authSession = requireAuth();

        if (authSession) {
            accountBtnLabel.textContent = "Keluar Akun";
            accountBtn.title = "Masuk sebagai " + authSession.username;
            accountBtn.addEventListener("click", () => {
                sessionStorage.removeItem(AUTH_SESSION_KEY);
                localStorage.removeItem(AUTH_SESSION_KEY);
                window.location.href = "login.html";
            });
        } else {
            accountBtnLabel.textContent = "Masuk Akun";
            accountBtn.addEventListener("click", () => {
                window.location.href = "login.html?next=beranda.html";
            });
        }

        navCatat.addEventListener("click", () => {
            window.location.href = "catat.html";
        });

        navPrediksi.addEventListener("click", () => {
            window.location.href = "prediksi.html";
        });

        function getTodayIso() {
            const now = new Date();
            const offsetMs = now.getTimezoneOffset() * 60000;
            return new Date(now.getTime() - offsetMs).toISOString().slice(0, 10);
        }

        function formatNumber(number) {
            return new Intl.NumberFormat("id-ID").format(number);
        }

        function formatCurrency(number) {
            return "Rp " + formatNumber(number);
        }

        function toNumber(value) {
            const parsed = Number(value);
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function readSalesRecords() {
            const raw = localStorage.getItem(SALES_RECORDS_KEY);
            if (!raw) {
                return [];
            }

            try {
                const records = JSON.parse(raw);
                return Array.isArray(records) ? records : [];
            } catch (error) {
                return [];
            }
        }

        function readPredictionSnapshot() {
            const raw = localStorage.getItem(PREDICTION_CHART_KEY);
            if (!raw) {
                return null;
            }

            try {
                const snapshot = JSON.parse(raw);
                if (!snapshot || !Array.isArray(snapshot.labels) || !Array.isArray(snapshot.quantities)) {
                    return null;
                }
                return snapshot;
            } catch (error) {
                return null;
            }
        }

        function escapeSvgText(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function renderEmptyChart(message) {
            salesChartEl.innerHTML = "";
            chartMetaEl.textContent = message;
        }

        function updateChartFromPrediction() {
            const snapshot = readPredictionSnapshot();
            if (!snapshot) {
                renderEmptyChart("Buka halaman prediksi untuk menghasilkan grafik.");
                return;
            }

            const quantities = snapshot.quantities
                .map((value) => Math.max(0, toNumber(value)))
                .slice(-7);
            const labels = snapshot.labels
                .map((label) => String(label || "-"))
                .slice(-quantities.length);
            const predictedQty = Math.max(0, toNumber(snapshot.predictedQty));

            if (!quantities.length) {
                renderEmptyChart("Data prediksi kosong. Isi data lalu buka halaman prediksi.");
                return;
            }

            const width = 320;
            const height = 170;
            const left = 28;
            const right = 12;
            const top = 12;
            const bottom = 30;
            const plotWidth = width - left - right;
            const plotHeight = height - top - bottom;
            const maxValue = Math.max(1, ...quantities, predictedQty);

            const points = quantities.map((value, index) => {
                const x = quantities.length === 1
                    ? left + plotWidth / 2
                    : left + (plotWidth * index) / (quantities.length - 1);
                const y = top + plotHeight * (1 - value / maxValue);
                return {
                    x,
                    y,
                    label: labels[index] || "-"
                };
            });

            const linePoints = points.map((point) => point.x.toFixed(2) + "," + point.y.toFixed(2)).join(" ");
            const dataDots = points
                .map((point) =>
                    '<circle cx="' + point.x.toFixed(2) + '" cy="' + point.y.toFixed(2) + '" r="3.6" fill="#1f3a8a"></circle>'
                )
                .join("");
            const labelsSvg = points
                .map((point) =>
                    '<text x="' + point.x.toFixed(2) + '" y="160" text-anchor="middle" font-size="10" fill="#4b5563">' +
                    escapeSvgText(point.label) +
                    '</text>'
                )
                .join("");

            const guideLines = [0, 0.5, 1]
                .map((ratio) => {
                    const y = top + plotHeight * ratio;
                    const valueLabel = Math.round(maxValue * (1 - ratio));
                    return (
                        '<line x1="' + left + '" y1="' + y.toFixed(2) + '" x2="' + (width - right) + '" y2="' + y.toFixed(2) + '" stroke="#e5e7eb" stroke-width="1"></line>' +
                        '<text x="4" y="' + (y + 3).toFixed(2) + '" font-size="10" fill="#6b7280">' + valueLabel + "</text>"
                    );
                })
                .join("");

            let predictionSvg = "";
            if (predictedQty > 0) {
                const lastPoint = points[points.length - 1];
                const predX = width - right;
                const predY = top + plotHeight * (1 - predictedQty / maxValue);

                predictionSvg =
                    '<line x1="' + lastPoint.x.toFixed(2) + '" y1="' + lastPoint.y.toFixed(2) + '" x2="' + predX.toFixed(2) + '" y2="' + predY.toFixed(2) + '" stroke="#d97706" stroke-width="2" stroke-dasharray="5 4"></line>' +
                    '<circle cx="' + predX.toFixed(2) + '" cy="' + predY.toFixed(2) + '" r="4" fill="#d97706"></circle>' +
                    '<text x="' + predX.toFixed(2) + '" y="' + (predY - 8).toFixed(2) + '" text-anchor="end" font-size="10" fill="#b45309">Prediksi</text>';
            }

            salesChartEl.innerHTML =
                guideLines +
                '<polyline points="' + linePoints + '" fill="none" stroke="#1f3a8a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></polyline>' +
                dataDots +
                predictionSvg +
                labelsSvg;

            if (snapshot.updatedAt) {
                const stamp = new Date(snapshot.updatedAt);
                const isValidDate = !Number.isNaN(stamp.getTime());
                chartMetaEl.textContent = isValidDate
                    ? "Sumber prediksi.html | Update " + new Intl.DateTimeFormat("id-ID", {
                        day: "2-digit",
                        month: "short",
                        hour: "2-digit",
                        minute: "2-digit"
                    }).format(stamp)
                    : "Sumber prediksi.html";
            } else {
                chartMetaEl.textContent = "Sumber prediksi.html";
            }
        }

        function updateDashboardCards() {
            const records = readSalesRecords();
            if (!records.length) {
                totalSalesTodayEl.textContent = "0";
                totalRevenueEl.textContent = "Rp 0";
                topProductEl.textContent = "-";
                topProductEl.title = "";
                topProductMetaEl.textContent = "Belum ada data";
                return;
            }

            const today = getTodayIso();
            let totalSalesToday = 0;
            let totalRevenue = 0;
            const productTotals = {};

            records.forEach((record) => {
                const quantity = toNumber(record.quantity);
                const gross = toNumber(record.gross);
                const expense = toNumber(record.expense);
                const net = Object.prototype.hasOwnProperty.call(record, "net") ? toNumber(record.net) : gross - expense;
                const productName = String(record.product || "").trim();
                const saleDate = String(record.saleDate || "");

                if (saleDate === today) {
                    totalSalesToday += quantity;
                }

                totalRevenue += net;

                if (productName) {
                    productTotals[productName] = (productTotals[productName] || 0) + quantity;
                }
            });

            let topProductName = "-";
            let topProductQuantity = 0;
            Object.entries(productTotals).forEach(([name, quantity]) => {
                if (quantity > topProductQuantity) {
                    topProductName = name;
                    topProductQuantity = quantity;
                }
            });

            totalSalesTodayEl.textContent = formatNumber(totalSalesToday);
            totalRevenueEl.textContent = formatCurrency(totalRevenue);
            topProductEl.textContent = topProductName;
            topProductEl.title = topProductName === "-" ? "" : topProductName;
            topProductMetaEl.textContent = topProductQuantity > 0
                ? formatNumber(topProductQuantity) + " item terjual"
                : "Belum ada data produk";
        }

        window.addEventListener("storage", (event) => {
            if (event.key === SALES_RECORDS_KEY) {
                updateDashboardCards();
            }
            if (event.key === PREDICTION_CHART_KEY) {
                updateChartFromPrediction();
            }
        });

        updateTodayDate();
        updateDashboardCards();
        updateChartFromPrediction();
    </script>
</body>
</html>
