<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>VizLyst - Catat Penjualan</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #ffffff;
			--ink: #111111;
			--line: #111111;
			--muted: #6b7280;
			--panel: #efefef;
			--input-bg: #f8f8f8;
			--focus: #111111;
			--success: #10754b;
			--error: #b12020;
			--shadow: none;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			min-height: 100%;
		}

		body {
			font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
			color: var(--ink);
			background: var(--bg);
			display: grid;
			place-items: center;
			padding: 16px;
		}

		.page-label {
			position: fixed;
			top: 34px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 1rem;
			font-weight: 400;
			color: #c9c9c9;
		}

		.page {
			width: min(100%, 300px);
			margin: 0 auto;
			padding: 12px 12px 16px;
			background: var(--panel);
			box-shadow: var(--shadow);
			animation: rise 0.45s ease-out both;
		}

		.topbar {
			display: flex;
			justify-content: space-between;
			align-items: flex-start;
			gap: 10px;
			margin-bottom: 8px;
		}

		.brand {
			display: inline-flex;
			align-items: center;
			gap: 8px;
		}

		.brand-mark {
			width: 34px;
			height: 34px;
			border-radius: 4px;
			background: #090909;
			color: #ffffff;
			display: grid;
			place-items: center;
			font-family: "Space Grotesk", "Manrope", sans-serif;
			font-size: 15px;
			font-weight: 700;
			line-height: 1;
		}

		.brand-name {
			margin: 0;
			font-family: "Space Grotesk", "Manrope", sans-serif;
			font-style: italic;
			font-size: 1.1rem;
			font-weight: 700;
		}

		.profile {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			font-size: 0.96rem;
			font-weight: 600;
		}

		.profile-icon {
			width: 24px;
			height: 24px;
			flex-shrink: 0;
		}

		.profile-icon svg {
			width: 100%;
			height: 100%;
			fill: none;
			stroke: #111111;
			stroke-width: 1.8;
		}

		.toolbar {
			margin: 2px 0 10px;
		}

		.back-btn {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			border: 2px solid var(--line);
			border-radius: 10px;
			background: #f7f7f7;
			color: #111111;
			text-decoration: none;
			font-family: "Space Grotesk", "Manrope", sans-serif;
			font-weight: 700;
			font-size: 0.9rem;
			line-height: 1;
			padding: 2px 8px 3px 6px;
		}

		.back-btn svg {
			width: 20px;
			height: 20px;
			fill: none;
			stroke: #111111;
			stroke-linecap: round;
			stroke-linejoin: round;
			stroke-width: 2.6;
			flex-shrink: 0;
		}

		.back-btn:hover {
			background: #f1f1f1;
		}

		.title-wrap {
			text-align: center;
			margin: 6px 0 12px;
			padding-bottom: 8px;
			border-bottom: 2px solid #111111;
		}

		.title {
			margin: 0;
			font-size: 1.22rem;
			line-height: 1.08;
			font-weight: 800;
			letter-spacing: -0.3px;
		}

		.form-grid {
			display: grid;
			grid-template-columns: 1fr;
			row-gap: 12px;
			margin-top: 8px;
		}

		.field {
			display: grid;
			row-gap: 8px;
			align-content: start;
			opacity: 0;
			animation: rise .4s ease-out forwards;
		}

		.field:nth-child(1) { animation-delay: .04s; }
		.field:nth-child(2) { animation-delay: .08s; }
		.field:nth-child(3) { animation-delay: .12s; }
		.field:nth-child(4) { animation-delay: .16s; }
		.field:nth-child(5) { animation-delay: .2s; }

		.field.step-5 {
			grid-column: 1;
		}

		.field-head {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			min-height: 28px;
		}

		.step {
			width: 28px;
			height: 28px;
			border: 2px solid var(--line);
			border-radius: 999px;
			display: grid;
			place-items: center;
			font-family: "Space Grotesk", "Manrope", sans-serif;
			font-size: 1rem;
			font-weight: 700;
			line-height: 1;
			background: #f5f5f5;
		}

		.field-head label {
			font-size: 1rem;
			font-weight: 700;
			letter-spacing: 0;
		}

		.input-wrap {
			position: relative;
		}

		.text-input {
			width: 100%;
			height: 42px;
			border: 2px solid var(--line);
			border-radius: 8px;
			background: var(--input-bg);
			color: #111111;
			font: inherit;
			font-size: 0.95rem;
			font-weight: 700;
			padding: 0 10px;
			transition: border-color .14s ease, box-shadow .14s ease, background-color .14s ease;
		}

		.text-input::placeholder {
			color: #69717e;
			font-weight: 700;
		}

		.input-wrap:focus-within .text-input,
		.text-input:focus {
			outline: none;
			border-color: var(--focus);
			box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.14);
			background: #ffffff;
		}

		.input-wrap.invalid .text-input {
			border-color: var(--error);
		}

		.input-wrap.date .date-display {
			padding-right: 34px;
			cursor: pointer;
		}

		.input-wrap.date .date-picker-hit {
			position: absolute;
			inset: 0;
			opacity: 0;
			cursor: pointer;
		}

		.input-wrap.date svg {
			position: absolute;
			top: 50%;
			right: 10px;
			transform: translateY(-50%);
			width: 20px;
			height: 20px;
			fill: none;
			stroke: #141414;
			stroke-width: 1.8;
			pointer-events: none;
		}

		.text-input[type="number"]::-webkit-outer-spin-button,
		.text-input[type="number"]::-webkit-inner-spin-button {
			-webkit-appearance: none;
			margin: 0;
		}

		.text-input[type="number"] {
			appearance: textfield;
			-moz-appearance: textfield;
		}

		.field-help {
			margin: 0;
			min-height: 16px;
			color: var(--error);
			font-size: 0.76rem;
			font-weight: 600;
		}

		.actions {
			margin-top: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 12px;
			flex-direction: column;
		}

		.meta {
			display: grid;
			gap: 6px;
			max-width: 100%;
			text-align: center;
		}

		.summary {
			margin: 0;
			font-size: 0.82rem;
			font-weight: 700;
			color: #2f3640;
			line-height: 1.3;
		}

		.summary.negative {
			color: var(--error);
		}

		.status {
			margin: 0;
			min-height: 18px;
			font-size: 0.78rem;
			font-weight: 700;
			color: #303030;
		}

		.status.error {
			color: var(--error);
		}

		.status.success {
			color: var(--success);
		}

		.status.info {
			color: #1f2937;
		}

		.save-btn {
			width: 96px;
			height: 38px;
			border: 2px solid var(--line);
			border-radius: 10px;
			background: #f7f7f7;
			color: #101010;
			font-family: "Space Grotesk", "Manrope", sans-serif;
			font-size: 0.95rem;
			font-weight: 700;
			letter-spacing: -0.2px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 6px;
			cursor: pointer;
			transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
		}

		.save-btn svg {
			width: 18px;
			height: 18px;
			fill: none;
			stroke: #111111;
			stroke-width: 1.8;
			stroke-linecap: round;
			stroke-linejoin: round;
			flex-shrink: 0;
		}

		.save-btn:hover:not(:disabled) {
			background: #f1f1f1;
		}

		.save-btn:disabled {
			cursor: not-allowed;
			opacity: 0.72;
		}

		.save-btn.loading {
			color: transparent;
			position: relative;
		}

		.save-btn.loading svg {
			opacity: 0;
		}

		.save-btn.loading::before {
			content: "";
			position: absolute;
			left: 50%;
			top: 50%;
			width: 16px;
			height: 16px;
			margin-left: -8px;
			margin-top: -8px;
			border-radius: 999px;
			border: 2px solid rgba(0, 0, 0, 0.2);
			border-top-color: #111111;
			animation: spin .7s linear infinite;
		}

		.back-btn:focus-visible,
		.save-btn:focus-visible,
		.text-input:focus-visible,
		.date-picker-hit:focus-visible + svg {
			outline: 3px solid rgba(22, 90, 166, 0.26);
			outline-offset: 2px;
		}

		@media (max-width: 1020px) {
			.page {
				width: min(100%, 300px);
			}
		}

		@media (max-width: 860px) {
			.form-grid {
				grid-template-columns: 1fr;
				row-gap: 12px;
				margin-top: 8px;
			}

			.field.step-5 {
				grid-column: 1;
			}
		}

		@media (max-width: 520px) {
			body {
				padding: 12px;
			}

			.page {
				width: min(100%, 300px);
				padding: 12px 10px 14px;
			}

			.brand-mark {
				width: 34px;
				height: 34px;
				border-radius: 4px;
				font-size: 15px;
			}

			.brand-name {
				font-size: 1.1rem;
			}

			.topbar {
				align-items: flex-start;
			}

			.profile {
				font-size: 0.9rem;
			}

			.back-btn {
				font-size: 0.88rem;
				padding: 2px 8px 3px 6px;
			}

			.back-btn svg {
				width: 18px;
				height: 18px;
			}

			.field-head {
				min-height: 28px;
				gap: 8px;
			}

			.field-head label {
				font-size: 1rem;
			}

			.step {
				width: 28px;
				height: 28px;
				font-size: 1rem;
			}

			.text-input {
				height: 40px;
				font-size: 0.93rem;
			}

			.save-btn {
				width: 96px;
				height: 38px;
				font-size: 0.95rem;
			}
		}

		@media (prefers-reduced-motion: reduce) {
			*,
			*::before,
			*::after {
				animation-duration: 0.01ms !important;
				animation-iteration-count: 1 !important;
				transition-duration: 0.01ms !important;
				scroll-behavior: auto !important;
			}
		}

		@keyframes rise {
			from {
				opacity: 0;
				transform: translateY(10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}
	</style>
</head>
<body>
	<p class="page-label">CATAT</p>
	<main class="page">
		<header class="topbar">
			<div class="brand">
				<div class="brand-mark" aria-hidden="true">VL</div>
				<p class="brand-name">VizLyst</p>
			</div>
			<div class="profile" aria-label="Profil pengguna">
				<span class="profile-icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" focusable="false">
						<circle cx="12" cy="12" r="9"></circle>
						<circle cx="12" cy="9" r="3"></circle>
						<path d="M6.7 18.2a6 6 0 0 1 10.6 0"></path>
					</svg>
				</span>
				<span id="profileName">Raysa S</span>
			</div>
		</header>

		<div class="toolbar">
			<a class="back-btn" id="backBtn" href="beranda.html">
				<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
					<path d="M20 12H4"></path>
					<path d="M11 5L4 12l7 7"></path>
				</svg>
				Kembali
			</a>
		</div>

		<div class="title-wrap">
			<h1 class="title">Masukan Data Penjualan</h1>
		</div>

		<form id="salesForm" novalidate>
			<div class="form-grid">
				<div class="field step-1">
					<div class="field-head">
						<span class="step" aria-hidden="true">1</span>
						<label for="saleDate">Tanggal</label>
					</div>
					<div class="input-wrap date" id="saleDateWrap">
						<input
							class="text-input date-display"
							id="saleDateDisplay"
							type="text"
							placeholder="Tanggal hari ini"
							readonly
							tabindex="-1"
							aria-hidden="true"
							aria-describedby="saleDateHelp"
						>
						<input
							class="date-picker-hit"
							id="saleDate"
							type="date"
							name="saleDate"
							aria-label="Pilih tanggal penjualan"
						>
						<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
							<rect x="3" y="5" width="18" height="16" rx="2"></rect>
							<path d="M16 3v4M8 3v4M3 10h18"></path>
						</svg>
					</div>
					<p class="field-help" id="saleDateHelp" aria-live="polite"></p>
				</div>

				<div class="field step-3">
					<div class="field-head">
						<span class="step" aria-hidden="true">3</span>
						<label for="quantity">Jumlah</label>
					</div>
					<div class="input-wrap" id="quantityWrap">
						<input
							class="text-input"
							id="quantity"
							type="number"
							name="quantity"
							min="1"
							step="1"
							inputmode="numeric"
							placeholder="Jumlah terjual"
							aria-describedby="quantityHelp"
							required
						>
					</div>
					<p class="field-help" id="quantityHelp" aria-live="polite"></p>
				</div>

				<div class="field step-2">
					<div class="field-head">
						<span class="step" aria-hidden="true">2</span>
						<label for="product">Produk</label>
					</div>
					<div class="input-wrap" id="productWrap">
						<input
							class="text-input"
							id="product"
							type="text"
							name="product"
							autocomplete="off"
							placeholder="Nama produk"
							aria-describedby="productHelp"
							required
						>
					</div>
					<p class="field-help" id="productHelp" aria-live="polite"></p>
				</div>

				<div class="field step-4">
					<div class="field-head">
						<span class="step" aria-hidden="true">4</span>
						<label for="unitPrice">Harga</label>
					</div>
					<div class="input-wrap" id="priceWrap">
						<input
							class="text-input"
							id="unitPrice"
							type="text"
							name="unitPrice"
							inputmode="numeric"
							placeholder="Harga per produk"
							aria-describedby="priceHelp"
							required
						>
					</div>
					<p class="field-help" id="priceHelp" aria-live="polite"></p>
				</div>

				<div class="field step-5">
					<div class="field-head">
						<span class="step" aria-hidden="true">5</span>
						<label for="expense">Pengeluaran</label>
					</div>
					<div class="input-wrap" id="expenseWrap">
						<input
							class="text-input"
							id="expense"
							type="text"
							name="expense"
							inputmode="numeric"
							placeholder="Biaya pengeluaran"
							aria-describedby="expenseHelp"
						>
					</div>
					<p class="field-help" id="expenseHelp" aria-live="polite"></p>
				</div>
			</div>

			<div class="actions">
				<div class="meta">
					<p class="summary" id="summary">Isi jumlah dan harga untuk melihat estimasi total.</p>
					<p class="status" id="status" aria-live="polite"></p>
				</div>
				<button class="save-btn" type="submit" id="saveBtn">
					<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
						<path d="M4 4h13l3 3v13H4z"></path>
						<path d="M8 4v6h8V4"></path>
						<path d="M8 20v-6h8v6"></path>
					</svg>
					Simpan
				</button>
			</div>
		</form>
	</main>

	<script>
		const DRAFT_KEY = "vizlyst.sales.draft";
		const RECORDS_KEY = "vizlyst.sales.records";
		const LAST_RECORD_KEY = "vizlyst.sales.last";

		const form = document.getElementById("salesForm");
		const backBtn = document.getElementById("backBtn");
		const saleDateInput = document.getElementById("saleDate");
		const saleDateDisplay = document.getElementById("saleDateDisplay");
		const saleDateWrap = document.getElementById("saleDateWrap");
		const productInput = document.getElementById("product");
		const quantityInput = document.getElementById("quantity");
		const unitPriceInput = document.getElementById("unitPrice");
		const expenseInput = document.getElementById("expense");
		const summaryEl = document.getElementById("summary");
		const saveBtn = document.getElementById("saveBtn");
		const status = document.getElementById("status");
		const profileNameEl = document.getElementById("profileName");

		const fieldRefs = {
			saleDate: {
				input: saleDateInput,
				wrap: saleDateWrap,
				help: document.getElementById("saleDateHelp")
			},
			product: {
				input: productInput,
				wrap: document.getElementById("productWrap"),
				help: document.getElementById("productHelp")
			},
			quantity: {
				input: quantityInput,
				wrap: document.getElementById("quantityWrap"),
				help: document.getElementById("quantityHelp")
			},
			unitPrice: {
				input: unitPriceInput,
				wrap: document.getElementById("priceWrap"),
				help: document.getElementById("priceHelp")
			},
			expense: {
				input: expenseInput,
				wrap: document.getElementById("expenseWrap"),
				help: document.getElementById("expenseHelp")
			}
		};

		let isDirty = false;

		function getTodayIso() {
			const now = new Date();
			const offsetMs = now.getTimezoneOffset() * 60000;
			return new Date(now.getTime() - offsetMs).toISOString().slice(0, 10);
		}

		function formatNumber(number) {
			return new Intl.NumberFormat("id-ID").format(number);
		}

		function formatCurrency(number) {
			return "Rp " + formatNumber(number);
		}

		function parseCurrency(value) {
			const digits = String(value).replace(/[^\d]/g, "");
			return digits ? Number(digits) : 0;
		}

		function formatDateLabel(isoValue) {
			if (!isoValue) {
				return "";
			}

			const date = new Date(isoValue + "T00:00:00");
			return new Intl.DateTimeFormat("id-ID", {
				day: "2-digit",
				month: "short",
				year: "numeric"
			}).format(date);
		}

		function syncDateDisplay() {
			saleDateDisplay.value = formatDateLabel(saleDateInput.value);
		}

		function setSaleDate(isoDate, shouldMarkDirty) {
			const todayIso = getTodayIso();
			saleDateInput.max = todayIso;
			const normalizedDate = isoDate && isoDate <= todayIso ? isoDate : todayIso;
			saleDateInput.value = normalizedDate;
			syncDateDisplay();
			clearFieldError(fieldRefs.saleDate);
			if (shouldMarkDirty) {
				markDirty();
			}
		}

		function setFieldError(field, message) {
			field.wrap.classList.add("invalid");
			field.help.textContent = message;
			field.input.setAttribute("aria-invalid", "true");
		}

		function clearFieldError(field) {
			field.wrap.classList.remove("invalid");
			field.help.textContent = "";
			field.input.removeAttribute("aria-invalid");
		}

		function clearAllErrors() {
			Object.values(fieldRefs).forEach((field) => clearFieldError(field));
		}

		function setStatus(message, type) {
			status.textContent = message;
			status.className = "status";
			if (type) {
				status.classList.add(type);
			}
		}

		function updateSummary() {
			const qty = Number(quantityInput.value) || 0;
			const unitPrice = parseCurrency(unitPriceInput.value);
			const expense = parseCurrency(expenseInput.value);

			if (!qty || !unitPrice) {
				summaryEl.textContent = "Isi jumlah dan harga untuk melihat estimasi total.";
				summaryEl.classList.remove("negative");
				return;
			}

			const gross = qty * unitPrice;
			const net = gross - expense;
			const netLabel = net < 0 ? "-" + formatCurrency(Math.abs(net)) : formatCurrency(net);

			summaryEl.textContent = "Total: " + formatCurrency(gross) + " | Estimasi bersih: " + netLabel;
			summaryEl.classList.toggle("negative", net < 0);
		}

		function markDirty() {
			isDirty = true;
			persistDraft();
		}

		function persistDraft() {
			const draft = {
				saleDate: saleDateInput.value,
				product: productInput.value,
				quantity: quantityInput.value,
				unitPrice: parseCurrency(unitPriceInput.value),
				expense: parseCurrency(expenseInput.value)
			};

			sessionStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
		}

		function restoreDraft() {
			const raw = sessionStorage.getItem(DRAFT_KEY);
			saleDateInput.max = getTodayIso();
			if (!raw) {
				setSaleDate(getTodayIso(), false);
				return;
			}

			try {
				const draft = JSON.parse(raw);
				setSaleDate(draft.saleDate || getTodayIso(), false);
				productInput.value = draft.product || "";
				quantityInput.value = draft.quantity || "";
				unitPriceInput.value = draft.unitPrice ? formatCurrency(draft.unitPrice) : "";
				expenseInput.value = draft.expense ? formatCurrency(draft.expense) : "";
				setStatus("Draft terakhir dipulihkan.", "info");
				isDirty = true;
			} catch (error) {
				setSaleDate(getTodayIso(), false);
			}
		}

		function readStoredRecords() {
			const raw = localStorage.getItem(RECORDS_KEY);
			if (!raw) {
				return [];
			}

			try {
				const records = JSON.parse(raw);
				return Array.isArray(records) ? records : [];
			} catch (error) {
				return [];
			}
		}

		function normalizeCurrencyInput(input, field) {
			input.addEventListener("input", () => {
				const value = parseCurrency(input.value);
				input.value = value ? formatCurrency(value) : "";
				clearFieldError(field);
				updateSummary();
				markDirty();
			});
		}

		function hasUnsavedContent() {
			return Boolean(
				saleDateInput.value ||
				productInput.value.trim() ||
				quantityInput.value ||
				unitPriceInput.value ||
				expenseInput.value
			);
		}

		function validateForm() {
			let isValid = true;
			clearAllErrors();
			setStatus("");

			const saleDate = saleDateInput.value;
			const todayIso = getTodayIso();
			const product = productInput.value.trim();
			const quantity = Number(quantityInput.value);
			const unitPrice = parseCurrency(unitPriceInput.value);
			const expense = parseCurrency(expenseInput.value);

			if (!saleDate) {
				setFieldError(fieldRefs.saleDate, "Tanggal wajib diisi.");
				isValid = false;
			} else if (saleDate > todayIso) {
				setFieldError(fieldRefs.saleDate, "Tanggal tidak boleh melebihi hari ini.");
				isValid = false;
			}

			if (product.length < 2) {
				setFieldError(fieldRefs.product, "Nama produk minimal 2 karakter.");
				isValid = false;
			}

			if (!Number.isInteger(quantity) || quantity < 1) {
				setFieldError(fieldRefs.quantity, "Jumlah minimal 1.");
				isValid = false;
			}

			if (unitPrice < 1) {
				setFieldError(fieldRefs.unitPrice, "Harga produk wajib lebih dari 0.");
				isValid = false;
			}

			if (expense > 0 && expense >= unitPrice * Math.max(quantity, 1)) {
				setStatus("Pengeluaran lebih besar dari total. Data tetap bisa disimpan jika sudah benar.", "info");
			}

			return isValid;
		}

		function fillProfileName() {
			const remembered =
				localStorage.getItem("vizlyst.remember.username") ||
				localStorage.getItem("vizlyst.prefill.username");
			profileNameEl.textContent = remembered || "Raysa S";
		}

		function resetForm() {
			form.reset();
			saleDateInput.max = getTodayIso();
			setSaleDate(getTodayIso(), false);
			clearAllErrors();
			updateSummary();
			isDirty = false;
			sessionStorage.removeItem(DRAFT_KEY);
			productInput.focus();
		}

		restoreDraft();
		fillProfileName();
		updateSummary();

		normalizeCurrencyInput(unitPriceInput, fieldRefs.unitPrice);
		normalizeCurrencyInput(expenseInput, fieldRefs.expense);

		saleDateWrap.addEventListener("click", (event) => {
			if (event.target === saleDateInput) {
				return;
			}

			if (typeof saleDateInput.showPicker === "function") {
				saleDateInput.showPicker();
			} else {
				saleDateInput.focus();
			}
		});

		saleDateInput.addEventListener("change", () => {
			const todayIso = getTodayIso();
			saleDateInput.max = todayIso;
			if (!saleDateInput.value) {
				syncDateDisplay();
				clearFieldError(fieldRefs.saleDate);
				return;
			}

			if (saleDateInput.value > todayIso) {
				setFieldError(fieldRefs.saleDate, "Tanggal tidak boleh melebihi hari ini.");
				return;
			}

			setSaleDate(saleDateInput.value, true);
		});

		productInput.addEventListener("input", () => {
			productInput.value = productInput.value.replace(/\s{2,}/g, " ");
			clearFieldError(fieldRefs.product);
			markDirty();
		});

		quantityInput.addEventListener("input", () => {
			quantityInput.value = quantityInput.value.replace(/[^\d]/g, "");
			clearFieldError(fieldRefs.quantity);
			updateSummary();
			markDirty();
		});

		backBtn.addEventListener("click", (event) => {
			if (!isDirty || !hasUnsavedContent()) {
				return;
			}

			const shouldLeave = window.confirm("Data belum disimpan. Kembali ke beranda?");
			if (!shouldLeave) {
				event.preventDefault();
			}
		});

		window.addEventListener("beforeunload", (event) => {
			if (!isDirty || !hasUnsavedContent()) {
				return;
			}

			event.preventDefault();
			event.returnValue = "";
		});

		form.addEventListener("submit", (event) => {
			event.preventDefault();

			if (!validateForm()) {
				setStatus("Periksa kembali data penjualan Anda.", "error");
				return;
			}

			const saleDate = saleDateInput.value || getTodayIso();
			const quantity = Number(quantityInput.value);
			const unitPrice = parseCurrency(unitPriceInput.value);
			const expense = parseCurrency(expenseInput.value);
			const gross = quantity * unitPrice;
			const net = gross - expense;

			const record = {
				saleDate,
				product: productInput.value.trim(),
				quantity,
				unitPrice,
				expense,
				gross,
				net,
				createdAt: new Date().toISOString()
			};

			saveBtn.disabled = true;
			saveBtn.classList.add("loading");
			setStatus("Menyimpan data penjualan...", "info");

			window.setTimeout(() => {
				const records = readStoredRecords();
				records.push(record);
				localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
				localStorage.setItem(LAST_RECORD_KEY, JSON.stringify(record));

				saveBtn.disabled = false;
				saveBtn.classList.remove("loading");
				setStatus("Data berhasil disimpan. Total catatan: " + records.length + ".", "success");
				resetForm();
			}, 850);
		});
	</script>
</body>
</html>
